name: Feature Request
description: Suggest a new feature or improvement for ou_estimator
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the analytical or trading
        use case motivating this feature — not just the implementation detail.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem does this solve? What trading or analytical workflow is currently
        blocked or awkward without this feature?
      placeholder: "As a pairs trader, I need X because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        How should this work? Describe the desired behavior from a user's perspective.
        Mathematical definitions (e.g., for new estimators) are welcome here.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: Which area of the app does this relate to?
      options:
        - Parameter Estimation (new method or output)
        - Charts & Visualization
        - Data Import / Export
        - UI / UX Improvement
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Have you tried other approaches or workarounds? Why are they insufficient?

  - type: textarea
    id: references
    attributes:
      label: References (if applicable)
      description: |
        Academic papers, formulas, or existing tools that implement this. For example:
        "Described in Avellaneda & Lee (2010), equation 5."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested before
          required: true
        - label: I'm willing to contribute a PR implementing this feature
